<!DOCTYPE html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>dejojo.me</title>

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: radial-gradient(circle at center, #0f172a, #020617);
        font-family: Arial, Helvetica, sans-serif;
        color: white;
        overflow: hidden;
        padding: 24px;
      }

      .container {
        text-align: center;
        position: relative;
        width: 100%;
        max-width: 900px;
      }

      .logo {
        width: 260px;
        max-width: 70vw;
        margin-bottom: 30px;
        filter: drop-shadow(0 0 20px rgba(0, 150, 255, 0.6));
        animation: pulse 3s infinite ease-in-out;
      }

      @keyframes pulse {
        0% { transform: scale(1); }
        50% { transform: scale(1.05); }
        100% { transform: scale(1); }
      }

      h1 {
        font-size: 3rem;
        margin-bottom: 15px;
        letter-spacing: 2px;
      }

      .highlight {
        color: #38bdf8;
        text-shadow: 0 0 10px #38bdf8, 0 0 20px #38bdf8;
      }

      p {
        font-size: 1.2rem;
        opacity: 0.8;
      }

      .glow-line {
        width: 120px;
        height: 3px;
        margin: 25px auto;
        background: linear-gradient(90deg, transparent, #38bdf8, transparent);
        box-shadow: 0 0 15px #38bdf8;
      }

      .bg-effect {
        position: absolute;
        width: 400px;
        height: 400px;
        background: #0ea5e9;
        filter: blur(120px);
        opacity: 0.15;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        z-index: -1;
      }

      .links {
        margin-top: 30px;
        display: flex;
        justify-content: center;
        gap: 20px;
        flex-wrap: wrap;
      }

      .links a {
        text-decoration: none;
        color: #38bdf8;
        border: 1px solid rgba(56, 189, 248, 0.4);
        padding: 10px 18px;
        border-radius: 999px;
        transition: 0.3s ease;
      }

      .links a:hover {
        background: rgba(56, 189, 248, 0.2);
        box-shadow: 0 0 10px #38bdf8;
      }

      @media (max-width: 600px) {
        h1 {
          font-size: 2rem;
        }

        .logo {
          width: 180px;
        }

        p {
          font-size: 1rem;
        }

        .links {
          gap: 12px;
        }

        .links a {
          padding: 9px 16px;
        }
      }
    </style>
  </head>

  <body>
    <div class="container">
      <div class="bg-effect"></div>

      <img src="logo.png" alt="dejojo Logo" class="logo" />

      <h1><span class="highlight">Hier wird gebaut</span></h1>

      <div class="glow-line"></div>

      <p>Die neue dejojo Website ist aktuell im Aufbau.</p>

      <div class="links">
        <a href="https://twitch.tv/dejojo_" target="_blank" rel="noopener noreferrer">Twitch</a>
        <a href="https://www.youtube.com/@dej_ojo" target="_blank" rel="noopener noreferrer">YouTube</a>
        <a href="https://www.tiktok.com/@de_j0j0" target="_blank" rel="noopener noreferrer">TikTok</a>
        <a href="https://www.instagram.com/dejojo_0/" target="_blank" rel="noopener noreferrer">Instagram</a>
      </div>
    </div>
  </body>
</html>
