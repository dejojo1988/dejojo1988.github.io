<!DOCTYPE html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>dejojo.me</title>

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: radial-gradient(circle at center, #0f172a, #020617);
        font-family: Arial, Helvetica, sans-serif;
        color: white;
        overflow: hidden;
        padding: 24px;
      }

      .container {
        text-align: center;
        position: relative;
        width: 100%;
        max-width: 900px;
      }

      .logo {
        width: 260px;
        max-width: 70vw;
        margin-bottom: 30px;
        filter: drop-shadow(0 0 20px rgba(0, 150, 255, 0.6));
        animation: pulse 3s infinite ease-in-out;
      }

      @keyframes pulse {
        0% {
          transform: scale(1);
        }
        50% {
          transform: scale(1.05);
        }
        100% {
          transform: scale(1);
        }
      }

      h1 {
        font-size: 3rem;
        margin-bottom: 15px;
        letter-spacing: 2px;
      }

      .highlight {
        color: #38bdf8;
        text-shadow: 0 0 10px #38bdf8, 0 0 20px #38bdf8;
      }

      p {
        font-size: 1.2rem;
        opacity: 0.85;
      }

      .glow-line {
        width: 120px;
        height: 3px;
        margin: 25px auto;
        background: linear-gradient(90deg, transparent, #38bdf8, transparent);
        box-shadow: 0 0 15px #38bdf8;
      }

      .bg-effect {
        position: absolute;
        width: 400px;
        height: 400px;
        background: #0ea5e9;
        filter: blur(120px);
        opacity: 0.15;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        z-index: -1;
      }

      .status-card {
        margin: 28px auto 0;
        width: 100%;
        max-width: 520px;
        padding: 18px 20px;
        border-radius: 18px;
        border: 1px solid rgba(56, 189, 248, 0.25);
        background: rgba(255, 255, 255, 0.04);
        backdrop-filter: blur(10px);
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
      }

      .status-label {
        font-size: 0.9rem;
        text-transform: uppercase;
        letter-spacing: 0.14em;
        opacity: 0.7;
        margin-bottom: 12px;
      }

      .status-row {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 12px;
        flex-wrap: wrap;
      }

      .status-dot {
        width: 12px;
        height: 12px;
        border-radius: 50%;
        background: #64748b;
        box-shadow: 0 0 10px rgba(100, 116, 139, 0.5);
      }

      .status-dot.live {
        background: #ef4444;
        box-shadow: 0 0 14px rgba(239, 68, 68, 0.95);
        animation: livePulse 1.5s infinite ease-in-out;
      }

      @keyframes livePulse {
        0% {
          transform: scale(1);
          opacity: 1;
        }
        50% {
          transform: scale(1.2);
          opacity: 0.75;
        }
        100% {
          transform: scale(1);
          opacity: 1;
        }
      }

      .status-text {
        font-size: 1.05rem;
        font-weight: 700;
      }

      .stream-meta {
        margin-top: 12px;
        font-size: 0.95rem;
        opacity: 0.8;
        line-height: 1.5;
      }

      .links {
        margin-top: 30px;
        display: flex;
        justify-content: center;
        gap: 20px;
        flex-wrap: wrap;
      }

      .links a {
        text-decoration: none;
        color: #38bdf8;
        border: 1px solid rgba(56, 189, 248, 0.4);
        padding: 10px 18px;
        border-radius: 999px;
        transition: 0.3s ease;
      }

      .links a:hover {
        background: rgba(56, 189, 248, 0.2);
        box-shadow: 0 0 10px #38bdf8;
      }

      @media (max-width: 600px) {
        h1 {
          font-size: 2rem;
        }

        .logo {
          width: 180px;
        }

        p {
          font-size: 1rem;
        }

        .links {
          gap: 12px;
        }

        .links a {
          padding: 9px 16px;
        }

        .status-card {
          padding: 16px;
        }
      }
    </style>
  </head>

  <body>
    <div class="container">
      <div class="bg-effect"></div>

      <img src="logo.png" alt="dejojo Logo" class="logo" />

      <h1><span class="highlight">Hier wird gebaut</span></h1>

      <div class="glow-line"></div>

      <p>Die neue dejojo Website ist aktuell im Aufbau.</p>

      <div class="status-card">
        <div class="status-label">Twitch Status</div>

        <div class="status-row">
          <div id="statusDot" class="status-dot"></div>
          <div id="statusText" class="status-text">Status wird geladen ...</div>
        </div>

        <div id="streamMeta" class="stream-meta">
          Bitte einen Moment warten.
        </div>
      </div>

      <div class="links">
        <a href="https://twitch.tv/dejojo_" target="_blank" rel="noopener noreferrer">Twitch</a>
        <a href="https://www.youtube.com/@dej_ojo" target="_blank" rel="noopener noreferrer">YouTube</a>
        <a href="https://www.tiktok.com/@de_j0j0" target="_blank" rel="noopener noreferrer">TikTok</a>
        <a href="https://www.instagram.com/dejojo_0/" target="_blank" rel="noopener noreferrer">Instagram</a>
      </div>
    </div>

    <script>
      async function loadTwitchStatus() {
        const statusDot = document.getElementById("statusDot");
        const statusText = document.getElementById("statusText");
        const streamMeta = document.getElementById("streamMeta");

        try {
          const response = await fetch("https://dejojowebpage.business-2b4.workers.dev/api/twitch-status");

          if (!response.ok) {
            throw new Error("Status konnte nicht geladen werden.");
          }

          const data = await response.json();

          if (data.live) {
            statusDot.classList.add("live");
            statusText.textContent = "Jetzt live auf Twitch";
            streamMeta.innerHTML = `
              ${data.title ? `<div><strong>${data.title}</strong></div>` : ""}
              ${data.game_name ? `<div>Game: ${data.game_name}</div>` : ""}
              ${typeof data.viewer_count === "number" ? `<div>Zuschauer: ${data.viewer_count}</div>` : ""}
            `;
          } else {
            statusDot.classList.remove("live");
            statusText.textContent = "Aktuell offline";
            streamMeta.textContent = "Der Stream ist gerade nicht live.";
          }
        } catch (error) {
          statusDot.classList.remove("live");
          statusText.textContent = "Status aktuell nicht verfügbar";
          streamMeta.textContent = "Die Verbindung zu Twitch konnte nicht hergestellt werden.";
          console.error(error);
        }
      }

      loadTwitchStatus();
      setInterval(loadTwitchStatus, 60000);
    </script>
  </body>
</html>
