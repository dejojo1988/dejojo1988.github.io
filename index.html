<!DOCTYPE html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>dejojo.me – Baustelle</title>
    <meta
      name="description"
      content="Die Website von dejojo befindet sich aktuell im Aufbau."
    />
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
        font-family: Arial, Helvetica, sans-serif;
        background: linear-gradient(135deg, #050816 0%, #0b1228 50%, #111827 100%);
        color: #ffffff;
      }

      .wrapper {
        width: 100%;
        max-width: 900px;
        text-align: center;
      }

      .card {
        background: rgba(255, 255, 255, 0.05);
        border: 1px solid rgba(255, 255, 255, 0.12);
        border-radius: 24px;
        padding: 48px 24px;
        backdrop-filter: blur(10px);
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.35);
      }

      .logo {
        max-width: 280px;
        width: 100%;
        height: auto;
        margin: 0 auto 32px;
        display: block;
      }

      h1 {
        font-size: clamp(2rem, 5vw, 3.5rem);
        margin-bottom: 16px;
        letter-spacing: 0.04em;
      }

      p {
        font-size: clamp(1rem, 2.4vw, 1.2rem);
        line-height: 1.6;
        color: rgba(255, 255, 255, 0.85);
      }

      .badge {
        display: inline-block;
        margin-top: 28px;
        padding: 12px 20px;
        border-radius: 999px;
        background: rgba(59, 130, 246, 0.18);
        border: 1px solid rgba(96, 165, 250, 0.35);
        color: #cfe3ff;
        font-size: 0.95rem;
        letter-spacing: 0.03em;
      }

      @media (max-width: 600px) {
        .card {
          padding: 36px 20px;
          border-radius: 18px;
        }

        .logo {
          max-width: 200px;
          margin-bottom: 24px;
        }

        .badge {
          margin-top: 22px;
          font-size: 0.9rem;
        }
      }
    </style>
  </head>
  <body>
    <main class="wrapper">
      <section class="card">
        <img src="logo.png" alt="dejojo Logo" class="logo" />

        <h1>Hier wird gebaut</h1>
        <p>
          Die Website von dejojo wird aktuell überarbeitet und Schritt für Schritt
          aufgebaut.
        </p>

        <div class="badge">Bald mehr</div>
      </section>
    </main>
  </body>
</html>
